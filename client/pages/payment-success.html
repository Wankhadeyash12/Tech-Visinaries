<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - FlexHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .success-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
    }

    .success-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 3rem;
      text-align: center;
      max-width: 500px;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: scaleIn 0.5s ease-out 0.3s both;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    .success-card h1 {
      color: #2ecc71;
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .success-card p {
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .details-box {
      background: #f8f9fa;
      border-left: 4px solid #3498db;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border-radius: 8px;
      text-align: left;
    }

    .details-box h3 {
      color: #2c3e50;
      margin: 0 0 1rem 0;
      font-size: 1.1rem;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      color: #555;
    }

    .detail-label {
      font-weight: 600;
      color: #2c3e50;
    }

    .detail-value {
      color: #666;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      flex-direction: column;
    }

    .button-group button,
    .button-group a {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }

    .btn-primary-success {
      background-color: #2ecc71;
      color: white;
    }

    .btn-primary-success:hover {
      background-color: #27ae60;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
    }

    .btn-secondary-success {
      background-color: #3498db;
      color: white;
    }

    .btn-secondary-success:hover {
      background-color: #2980b9;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .error-message {
      display: none;
      background-color: #f8d7da;
      color: #721c24;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border-left: 4px solid #e74c3c;
    }

    @media (max-width: 600px) {
      .success-card {
        padding: 2rem;
      }

      .success-card h1 {
        font-size: 1.5rem;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="success-card">
      <div class="success-icon">✅</div>
      <h1>Payment Successful!</h1>
      <p>Your registration has been confirmed. Your payment is being processed.</p>

      <div class="error-message" id="errorMessage"></div>

      <div class="details-box" id="detailsBox" style="display: none;">
        <h3>Registration Details</h3>
        <div class="detail-item">
          <span class="detail-label">Event:</span>
          <span class="detail-value" id="eventName">-</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Team Name:</span>
          <span class="detail-value" id="teamName">-</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Team Members:</span>
          <span class="detail-value" id="teamMembers">-</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Payment Status:</span>
          <span class="detail-value" id="paymentStatus">-</span>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-primary-success" onclick="goToDashboard()">
          Go to Dashboard
        </button>
        <a href="/browse-events" class="btn-secondary-success">
          Browse More Events
        </a>
      </div>

      <p style="margin-top: 2rem; font-size: 0.9rem; color: #999;">
        Confirmation email has been sent to your registered email address.
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateNavigation();
      verifyPayment();
    });

    const verifyPayment = async () => {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');

        if (!sessionId) {
          showError('Session ID not found');
          return;
        }

        // First, complete the payment in the database (for local testing without webhooks)
        console.log('Completing payment for session:', sessionId);
        const completeResponse = await fetch(
          '/api/payments/complete-payment',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${localStorage.getItem('token')}`,
            },
            body: JSON.stringify({ sessionId }),
          }
        );

        if (!completeResponse.ok) {
          console.warn('Failed to complete payment in database:', await completeResponse.text());
          // Continue anyway - the webhook might still process it
        } else {
          console.log('Payment completed successfully in database');
        }

        // Get payment session details from backend
        const response = await fetch(
          `/api/payments/session-details?sessionId=${sessionId}`,
          {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${localStorage.getItem('token')}`,
            },
          }
        );

        if (!response.ok) {
          throw new Error('Failed to verify payment');
        }

        const data = await response.json();

        // Display registration details
        displayRegistrationDetails(data.registration);

        // Show success details box
        document.getElementById('detailsBox').style.display = 'block';
      } catch (error) {
        console.error('Verify payment error:', error);
        showError('Failed to verify payment: ' + error.message);
      }
    };

    const displayRegistrationDetails = (registration) => {
      document.getElementById('eventName').textContent = registration.event.title;
      document.getElementById('teamName').textContent = registration.teamName;
      document.getElementById('teamMembers').textContent = registration.teamMembers
        ? registration.teamMembers.length
        : '0';
      document.getElementById('paymentStatus').textContent =
        registration.paymentStatus === 'Completed' ? '✓ Completed' : registration.paymentStatus;
    };

    const showError = (message) => {
      const errorBox = document.getElementById('errorMessage');
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    };

    const goToDashboard = () => {
      const user = getLoggedInUser();
      if (user && user.role === 'participant') {
        window.location.href = '/participant-dashboard';
      } else if (user && user.role === 'organizer') {
        window.location.href = '/organizer-dashboard';
      } else {
        window.location.href = '/';
      }
    };
  </script>
</body>
</html>
