<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FlexHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <h1>🎉 FlexHub</h1>
    <div>
      <a href="/">Home</a>
      <a href="/browse-events">Browse Events</a>
      <a href="/register">Register</a>
    </div>
  </nav>

  <div class="container">
    <form id="loginForm" style="max-width: 500px;">
      <h1 style="text-align: center; color: #2c3e50; margin-bottom: 1.5rem;">Login to FlexHub</h1>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter your password">
      </div>

      <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; font-size: 1.1rem;">
        Login
      </button>

      <p style="text-align: center; margin-top: 1rem;">
        Don't have an account? <a href="/register" style="color: #3498db; text-decoration: none; font-weight: 600;">Register here</a>
      </p>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      redirectIfLoggedIn();

      const form = document.getElementById('loginForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          const response = await authAPI.login({ email, password });
          setLoggedInUser(response.user, response.token);
          alert('Login successful!');
          
          const user = response.user;
          if (user.role === 'organizer') {
            window.location.href = '/organizer-dashboard';
          } else {
            window.location.href = '/participant-dashboard';
          }
        } catch (error) {
          alert('Login failed: ' + error.message);
        }
      });
    });
  </script>
</body>
</html>
