<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Events - FlexHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <nav>
    <h1>🎉 FlexHub - Browse Events</h1>
    <div>
      <a href="/">Home</a>
      <a href="/browse-events">Browse Events</a>
    </div>
    <div id="nav-user-info"></div>
  </nav>

  <div class="container">
    <div class="browse-header">
      <h1>Discover Events</h1>
      <p>Find and register for amazing events happening near you!</p>
    </div>

    <!-- Search and Filter Bar -->
    <div class="search-filter-bar">
      <div class="search-box">
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search events by title..."
        >
      </div>

      <div class="filter-box">
        <select id="modeFilter">
          <option value="">All Modes</option>
          <option value="online">Online</option>
          <option value="offline">Offline</option>
          <option value="hybrid">Hybrid</option>
        </select>

        <select id="sortByFilter">
          <option value="latest">Latest</option>
          <option value="upcoming">Upcoming</option>
          <option value="trending">Most Popular</option>
        </select>

        <button id="searchBtn" class="btn-primary">Search</button>
      </div>
    </div>

    <!-- Events Grid -->
    <div id="eventsGrid" class="events-grid">
      <div style="text-align: center; grid-column: 1 / -1;">
        <p>Loading events...</p>
      </div>
    </div>

    <!-- No Results Message -->
    <div id="noResults" style="display: none; text-align: center; padding: 2rem;">
      <h3>No events found</h3>
      <p>Try adjusting your search filters</p>
    </div>
  </div>

  <style>
    .browse-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .browse-header h1 {
      color: var(--secondary-color);
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .browse-header p {
      color: #666;
      font-size: 1.1rem;
    }

    .search-filter-bar {
      background: white;
      padding: 1.5rem;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      margin-bottom: 2rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: end;
    }

    .search-box input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #bdc3c7;
      border-radius: var(--border-radius);
      font-size: 1rem;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    .filter-box {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-box select {
      padding: 10px 12px;
      border: 1px solid #bdc3c7;
      border-radius: var(--border-radius);
      font-size: 0.95rem;
    }

    .filter-box .btn-primary {
      padding: 10px 20px;
    }

    .event-card-browse {
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      overflow: hidden;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .event-card-browse:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
    }

    .event-banner-container {
      width: 100%;
      height: 200px;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .event-banner-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .event-card-browse-content {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .event-card-browse h3 {
      color: var(--secondary-color);
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .event-meta-compact {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 1rem;
      display: grid;
      gap: 0.4rem;
    }

    .event-meta-compact p {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .event-organizer {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #ecf0f1;
    }

    .event-actions-browse {
      display: flex;
      gap: 0.5rem;
      margin-top: auto;
    }

    .event-actions-browse button {
      flex: 1;
      padding: 10px 12px;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .search-filter-bar {
        grid-template-columns: 1fr;
      }

      .filter-box {
        width: 100%;
      }

      .filter-box select,
      .filter-box button {
        flex: 1;
        min-width: 0;
      }

      .browse-header h1 {
        font-size: 2rem;
      }
    }
  </style>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateNavigation();
      loadEvents();
      setupEventListeners();
    });

    let allEvents = [];

    const loadEvents = async (search = '', mode = '', sortBy = 'latest') => {
      try {
        const response = await eventAPI.getAllPublishedEvents(search, mode, sortBy);
        allEvents = response.events;

        if (allEvents.length === 0) {
          document.getElementById('eventsGrid').style.display = 'none';
          document.getElementById('noResults').style.display = 'block';
        } else {
          document.getElementById('noResults').style.display = 'none';
          displayEvents(allEvents);
        }
      } catch (error) {
        console.error('Error loading events:', error);
        document.getElementById('eventsGrid').innerHTML = 
          '<p style="grid-column: 1 / -1; text-align: center; color: red;">Error loading events</p>';
      }
    };

    const displayEvents = (events) => {
      const grid = document.getElementById('eventsGrid');
      
      if (events.length === 0) {
        grid.style.display = 'none';
        document.getElementById('noResults').style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      grid.innerHTML = events
        .map((event) => {
          const eventDate = new Date(event.eventDateTime);
          const formattedDate = eventDate.toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
          });
          const formattedTime = eventDate.toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
          });

          const registrationDeadline = new Date(event.registrationDeadline);
          const isRegistrationOpen = new Date() < registrationDeadline;

          return `
            <div class="event-card-browse">
              <div class="event-banner-container">
                ${event.bannerImage 
                  ? `<img src="${event.bannerImage}" alt="${event.title}">` 
                  : `<div style="color: white; text-align: center; font-size: 3rem;">📅</div>`
                }
              </div>
              
              <div class="event-card-browse-content">
                <h3>${event.title}</h3>
                
                <div class="event-meta-compact">
                  <p>📍 <strong>${event.eventMode.toUpperCase()}</strong></p>
                  <p>📅 ${formattedDate} at ${formattedTime}</p>
                  <p>👥 Team: ${event.teamMinSize}-${event.teamMaxSize} members</p>
                  <p>💰 ₹${event.registrationFee}</p>
                </div>

                <div class="event-organizer">
                  <strong>By:</strong> ${event.organizer.name}
                </div>

                <div class="event-actions-browse">
                  <button class="btn-primary" onclick="viewEventDetails('${event.slug}')">
                    View Details
                  </button>
                  ${isRegistrationOpen 
                    ? `<button class="btn-success" onclick="registerForEvent('${event.slug}')">
                        Register
                      </button>`
                    : `<button class="btn-danger" style="cursor: not-allowed;" disabled>
                        Closed
                      </button>`
                  }
                </div>
              </div>
            </div>
          `;
        })
        .join('');
    };

    const setupEventListeners = () => {
      const searchBtn = document.getElementById('searchBtn');
      const searchInput = document.getElementById('searchInput');
      const modeFilter = document.getElementById('modeFilter');
      const sortByFilter = document.getElementById('sortByFilter');

      searchBtn.addEventListener('click', performSearch);
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
      });

      modeFilter.addEventListener('change', performSearch);
      sortByFilter.addEventListener('change', performSearch);
    };

    const performSearch = () => {
      const search = document.getElementById('searchInput').value;
      const mode = document.getElementById('modeFilter').value;
      const sortBy = document.getElementById('sortByFilter').value;
      
      loadEvents(search, mode, sortBy);
    };

    const viewEventDetails = (slug) => {
      if (isLoggedIn()) {
        window.location.href = `/event-details?slug=${slug}`;
      } else {
        window.location.href = `/login?redirect=/event-details?slug=${slug}`;
      }
    };

    const registerForEvent = (slug) => {
      if (isLoggedIn()) {
        const user = getLoggedInUser();
        if (user.role === 'organizer') {
          alert('Organizers cannot register for events');
          return;
        }
        window.location.href = `/participate?slug=${slug}`;
      } else {
        window.location.href = `/login?redirect=/participate?slug=${slug}`;
      }
    };
  </script>
</body>
</html>
