<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - FlexHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
  <nav>
    <h1>🎉 FlexHub - Analytics</h1>
    <div>
      <a href="/">Home</a>
      <a href="/organizer-dashboard">Dashboard</a>
    </div>
    <div id="nav-user-info"></div>
  </nav>

  <div class="container">
    <div id="analyticsContainer">
      <div style="text-align: center; padding: 2rem;">
        <p>Loading analytics...</p>
      </div>
    </div>

    <style>
      .analytics-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .summary-card {
        background: white;
        padding: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        border-left: 4px solid #3498db;
      }

      .summary-card h4 {
        color: #666;
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
      }

      .summary-card .big-number {
        font-size: 2.5rem;
        color: #3498db;
        font-weight: bold;
        margin: 0;
      }

      .charts-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 2rem;
        margin-bottom: 2rem;
      }

      .chart-wrapper {
        background: white;
        padding: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .events-analytics {
        background: white;
        padding: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow-x: auto;
      }

      .events-analytics h3 {
        color: #2c3e50;
        margin-bottom: 1.5rem;
      }

      .analytics-table {
        width: 100%;
        border-collapse: collapse;
      }

      .analytics-table thead {
        background-color: #2c3e50;
        color: white;
      }

      .analytics-table th,
      .analytics-table td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #ecf0f1;
      }

      .analytics-table tbody tr:hover {
        background-color: #f8f9fa;
      }

      @media (max-width: 768px) {
        .analytics-summary {
          grid-template-columns: repeat(2, 1fr);
        }

        .charts-container {
          grid-template-columns: 1fr;
        }

        .chart-wrapper {
          padding: 1rem;
        }

        .summary-card .big-number {
          font-size: 2rem;
        }

        .analytics-table {
          font-size: 0.9rem;
        }

        .analytics-table th,
        .analytics-table td {
          padding: 8px 10px;
        }
      }
    </style>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/analytics.js"></script>
</body>
</html>
