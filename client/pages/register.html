<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FlexHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <h1>🎉 FlexHub</h1>
    <div>
      <a href="/">Home</a>
      <a href="/browse-events">Browse Events</a>
      <a href="/login">Login</a>
    </div>
  </nav>

  <div class="container">
    <form id="registerForm" style="max-width: 500px;">
      <h1 style="text-align: center; color: #2c3e50; margin-bottom: 1.5rem;">Join FlexHub</h1>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Your full name">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Minimum 6 characters">
      </div>

      <div class="form-group">
        <label for="college">College/University (Optional)</label>
        <input type="text" id="college" name="college" placeholder="Your college name">
      </div>

      <div class="form-group">
        <label for="role">I want to register as:</label>
        <select id="role" name="role" required>
          <option value="">Select your role</option>
          <option value="organizer">Organizer (Create and manage events)</option>
          <option value="participant">Participant (Join events)</option>
        </select>
      </div>

      <button type="submit" class="btn-success" style="width: 100%; padding: 12px; font-size: 1.1rem;">
        Create Account
      </button>

      <p style="text-align: center; margin-top: 1rem;">
        Already have an account? <a href="/login" style="color: #3498db; text-decoration: none; font-weight: 600;">Login here</a>
      </p>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      redirectIfLoggedIn();

      // Set role from URL params if present
      const urlParams = new URLSearchParams(window.location.search);
      const roleParam = urlParams.get('role');
      if (roleParam && (roleParam === 'organizer' || roleParam === 'participant')) {
        document.getElementById('role').value = roleParam;
      }

      const form = document.getElementById('registerForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const college = document.getElementById('college').value;
        const role = document.getElementById('role').value;

        if (password.length < 6) {
          alert('Password must be at least 6 characters long');
          return;
        }

        try {
          const response = await authAPI.register({
            name,
            email,
            password,
            role,
            college,
          });
          setLoggedInUser(response.user, response.token);
          alert('Registration successful!');
          
          if (role === 'organizer') {
            window.location.href = '/organizer-dashboard';
          } else {
            window.location.href = '/participant-dashboard';
          }
        } catch (error) {
          alert('Registration failed: ' + error.message);
        }
      });
    });
  </script>
</body>
</html>
