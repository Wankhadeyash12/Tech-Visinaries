<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Participant Dashboard - FlexHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <nav>
    <h1>🎉 FlexHub - My Dashboard</h1>
    <div>
      <a href="/">Home</a>
      <a href="/browse-events">Browse Events</a>
    </div>
    <div id="nav-user-info"></div>
  </nav>

  <div class="container">
    <div class="dashboard-header">
      <h1>My Event Dashboard</h1>
    </div>

    <!-- Tabs for switching between views -->
    <div class="tabs-container" style="margin-bottom: 2rem;">
      <button class="tab-btn active" onclick="switchTab('registrations')">My Registrations</button>
      <button class="tab-btn" onclick="switchTab('available')">Available Events</button>
    </div>

    <!-- My Registrations Tab -->
    <div id="registrations-tab" class="tab-content">
      <h2 style="margin-bottom: 1.5rem; color: #2c3e50;">My Event Registrations</h2>
      <div id="registrationsContainer" class="registrations-container">
        <div style="text-align: center;">
          <p>Loading your registrations...</p>
        </div>
      </div>
    </div>

    <!-- Available Events Tab -->
    <div id="available-tab" class="tab-content" style="display: none;">
      <h2 style="margin-bottom: 1rem; color: #2c3e50;">Available Events to Join</h2>
      
      <div class="search-filter-bar">
        <input 
          type="text" 
          id="browseSearchInput" 
          placeholder="Search events..." 
        >
        <select id="browseModeFilter">
          <option value="">All Modes</option>
          <option value="online">Online</option>
          <option value="offline">Offline</option>
          <option value="hybrid">Hybrid</option>
        </select>
        <button class="btn-primary" onclick="browseAvailableEvents()">Search</button>
      </div>

      <div id="availableEventsContainer" class="events-grid">
        <div style="text-align: center; grid-column: 1 / -1;">
          <p>Loading available events...</p>
        </div>
      </div>
    </div>
  </div>

  <style>
    .tabs-container {
      display: flex;
      gap: 1rem;
      border-bottom: 2px solid #ecf0f1;
    }

    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #666;
      transition: all 0.3s;
    }

    .tab-btn:hover {
      color: var(--primary-color);
    }

    .tab-btn.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }

    .tab-content {
      min-height: 400px;
    }

    .search-filter-bar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 0.75rem;
      align-items: center;
    }

    .registration-card {
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid var(--primary-color);
    }

    .registration-header {
      margin-bottom: 1rem;
      border-bottom: 2px solid var(--light-gray);
      padding-bottom: 1rem;
    }

    .registration-header h3 {
      color: var(--secondary-color);
      font-size: 1.3rem;
      margin: 0;
    }

    .registration-status {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .status-item {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 6px;
      text-align: center;
    }

    .status-item p {
      margin: 0 0 0.5rem 0;
      color: #666;
      font-size: 0.85rem;
    }

    .status-item .status-value {
      font-size: 1.3rem;
      font-weight: 600;
      display: inline-block;
      padding: 6px 12px;
      border-radius: 4px;
    }

    .status-value.approved {
      background-color: #d4edda;
      color: #155724;
    }

    .status-value.pending {
      background-color: #fff3cd;
      color: #856404;
    }

    .status-value.rejected {
      background-color: #f8d7da;
      color: #721c24;
    }

    .status-value.completed {
      background-color: #d4edda;
      color: #155724;
    }

    .team-details {
      margin-top: 1rem;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 6px;
    }

    .team-details h4 {
      color: #2c3e50;
      font-size: 1rem;
      margin: 0 0 0.5rem 0;
    }

    .team-member {
      padding: 0.5rem;
      color: #666;
      font-size: 0.9rem;
    }

    .empty-state-message {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
    }

    @media (max-width: 768px) {
      .tabs-container {
        flex-direction: column;
      }

      .search-filter-bar {
        grid-template-columns: 1fr;
      }

      .registration-status {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let registeredEventIds = [];
    
    document.addEventListener('DOMContentLoaded', () => {
      redirectIfNotRole('participant');
      loadParticipantRegistrations();
      updateNavigation();
      setupBrowseSearch();
    });

    const switchTab = (tabName) => {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.style.display = 'none';
      });
      
      // Remove active class from all buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      // Show selected tab
      document.getElementById(`${tabName}-tab`).style.display = 'block';
      event.target.classList.add('active');

      // Load available events if switching to that tab
      if (tabName === 'available') {
        browseAvailableEvents();
      }
    };

    const loadParticipantRegistrations = async () => {
      try {
        const response = await registrationAPI.getParticipantRegistrations();
        const registrations = response.registrations;
        
        // Store registered event IDs
        registeredEventIds = registrations.map(reg => reg.event._id);

        if (registrations.length === 0) {
          displayNoRegistrations();
        } else {
          displayParticipantRegistrations(registrations);
        }
      } catch (error) {
        console.error('Error loading registrations:', error);
        document.getElementById('registrationsContainer').innerHTML = 
          '<p style="color: red;">Error loading registrations</p>';
      }
    };

    const displayNoRegistrations = () => {
      const container = document.getElementById('registrationsContainer');
      container.innerHTML = `
        <div class="empty-state-message">
          <h3 style="color: #2c3e50; margin-bottom: 1rem;">No Registrations Yet</h3>
          <p style="color: #666; margin-bottom: 1rem;">You haven't registered for any events yet.</p>
          <button class="btn-primary" onclick="switchTab('available')">Browse Events</button>
        </div>
      `;
    };

    const displayParticipantRegistrations = (registrations) => {
      const container = document.getElementById('registrationsContainer');
      
      container.innerHTML = registrations
        .map((reg) => {
          const eventDate = new Date(reg.event.eventDateTime).toLocaleDateString('en-US', {
            weekday: 'short',
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
          });

          const approvalClass = reg.approvalStatus.toLowerCase();
          const paymentClass = reg.paymentStatus.toLowerCase();

          return `
            <div class="registration-card">
              <div class="registration-header">
                <h3>${reg.event.title}</h3>
              </div>

              <div class="registration-status">
                <div class="status-item">
                  <p>Team Name</p>
                  <div style="font-weight: 600; color: #2c3e50;">${reg.teamName}</div>
                </div>
                <div class="status-item">
                  <p>Team Members</p>
                  <div style="font-weight: 600; color: #2c3e50;">${reg.teamMembers.length}</div>
                </div>
                <div class="status-item">
                  <p>Registration Status</p>
                  <span class="status-value ${approvalClass}">${reg.approvalStatus}</span>
                </div>
                <div class="status-item">
                  <p>Payment Status</p>
                  <span class="status-value ${paymentClass}">${reg.paymentStatus}</span>
                </div>
              </div>

              <div class="team-details">
                <h4>👥 Team Members:</h4>
                ${reg.teamMembers.map(member => `
                  <div class="team-member">
                    <strong>${member.name}</strong> - ${member.email}
                  </div>
                `).join('')}
              </div>

              <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #ecf0f1;">
                <small style="color: #999;">Event Date: ${eventDate}</small>
                ${reg.registrationFee > 0 ? `<br><small style="color: #999;">Fee: ₹${reg.registrationFee}</small>` : ''}
              </div>
            </div>
          `;
        })
        .join('');
    };

    const setupBrowseSearch = () => {
      const searchInput = document.getElementById('browseSearchInput');
      if (searchInput) {
        searchInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') browseAvailableEvents();
        });
      }
    };

    const browseAvailableEvents = async () => {
      try {
        const search = document.getElementById('browseSearchInput').value || '';
        const mode = document.getElementById('browseModeFilter').value || '';
        
        const response = await eventAPI.getAllPublishedEvents(search, mode, 'upcoming');
        const events = response.events;

        displayAvailableEvents(events);
      } catch (error) {
        console.error('Error loading events:', error);
        document.getElementById('availableEventsContainer').innerHTML = 
          '<p style="color: red; grid-column: 1 / -1;">Error loading events</p>';
      }
    };

    const displayAvailableEvents = (events) => {
      const container = document.getElementById('availableEventsContainer');

      if (events.length === 0) {
        container.innerHTML = `
          <div class="empty-state-message" style="grid-column: 1 / -1;">
            <h3>No events found</h3>
            <p>Try adjusting your search filters</p>
          </div>
        `;
        return;
      }

      container.innerHTML = events
        .map((event) => {
          const isRegistered = registeredEventIds.includes(event._id);
          const eventDate = new Date(event.eventDateTime);
          const formattedDate = eventDate.toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
          });
          const formattedTime = eventDate.toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
          });

          const registrationDeadline = new Date(event.registrationDeadline);
          const isRegistrationOpen = new Date() < registrationDeadline;

          return `
            <div class="event-card-browse" style="border: ${isRegistered ? '2px solid #2ecc71' : 'none'};">
              <div class="event-banner-container">
                ${event.bannerImage 
                  ? `<img src="${event.bannerImage}" alt="${event.title}">` 
                  : `<div style="color: white; text-align: center; font-size: 3rem;">📅</div>`
                }
                ${isRegistered ? `<div style="position: absolute; top: 10px; right: 10px; background: #2ecc71; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">✓ Registered</div>` : ''}
              </div>
              
              <div class="event-card-browse-content">
                <h3>${event.title}</h3>
                
                <div class="event-meta-compact">
                  <p>📍 <strong>${event.eventMode.toUpperCase()}</strong></p>
                  <p>📅 ${formattedDate} at ${formattedTime}</p>
                  <p>👥 Team: ${event.teamMinSize}-${event.teamMaxSize} members</p>
                  <p>💰 ₹${event.registrationFee}</p>
                </div>

                <div class="event-organizer">
                  <strong>By:</strong> ${event.organizer.name}
                </div>

                <div class="event-actions-browse">
                  <button class="btn-primary" onclick="viewEventDetails('${event.slug}')">
                    View Details
                  </button>
                  ${!isRegistered && isRegistrationOpen 
                    ? `<button class="btn-success" onclick="registerForEvent('${event.slug}')">
                        Register
                      </button>`
                    : isRegistered 
                    ? `<button class="btn-success" disabled style="opacity: 0.6;">Already Registered</button>`
                    : `<button class="btn-danger" disabled style="cursor: not-allowed;">Registration Closed</button>`
                  }
                </div>
              </div>
            </div>
          `;
        })
        .join('');
    };

    const viewEventDetails = (slug) => {
      window.location.href = `/event-details?slug=${slug}`;
    };

    const registerForEvent = (slug) => {
      window.location.href = `/participate?slug=${slug}`;
    };
  </script>
</body>
</html>
